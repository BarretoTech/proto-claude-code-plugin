name: Release
on:
  push:
    tags:
      - "v[0-9]+*"
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true
      - run: rustup target add wasm32-wasip1
      - id: build
        # Pinned to unreleased commit that fixes wasm32-wasi -> wasm32-wasip1 (post v0.4.2)
        uses: moonrepo/build-wasm-plugin@ca352089beda2ce681f569b3f9aa7d074058e6d7
      - if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: builds/*
          body: ${{ steps.build.outputs.changelog-entry }}
          makeLatest: true
          prerelease: ${{ steps.build.outputs.prerelease }}
          skipIfReleaseExists: true
      - if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: builds/*
          tag: ${{ inputs.tag }}
          makeLatest: true
          skipIfReleaseExists: true
